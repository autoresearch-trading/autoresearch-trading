app = "pacifica-collector"
primary_region = "sjc"  # San Jose - closest to Panama

[build]
  dockerfile = "../Dockerfile.cloud"

[env]
  ENV = "cloud"
  PACIFICA_NETWORK = "mainnet"
  PACIFICA_API_TIMEOUT = "10"
  PACIFICA_MAX_RETRIES = "5"
  DATA_ROOT = "/app/data"
  LOGS_ROOT = "/app/logs"
  LOG_LEVEL = "INFO"
  POLL_PRICES = "2s"
  POLL_TRADES = "1s"
  POLL_ORDERBOOK = "3s"
  POLL_FUNDING = "60s"
  BOOK_DEPTH = "25"
  MAX_RPS = "3"  # Conservative for all symbols

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false  # Keep running 24/7
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'  # Free tier
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "data_volume"
  destination = "/app/data"
  initial_size = "3gb"  # Free tier limit
