services:
  - type: web
    name: pacifica-collector
    env: docker
    dockerfilePath: ./Dockerfile.cloud
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PACIFICA_NETWORK
        value: mainnet
      - key: MAX_RPS
        value: 3
      - key: POLL_TRADES
        value: 1s
      - key: POLL_ORDERBOOK
        value: 3s
      - key: POLL_PRICES
        value: 2s
      - key: POLL_FUNDING
        value: 60s
      - key: BOOK_DEPTH
        value: 25
      - key: OUT_ROOT
        value: /app/data
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 10

