services:
  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"  # HTTP
      - "8812:8812"  # PostgreSQL wire protocol
    environment:
      QDB_CAIRO_DEFAULT_TYPE: LINUX
    volumes:
      - questdb_data:/var/lib/questdb

  data-collector:
    build:
      context: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
    depends_on:
      - questdb
    command: python collect_data.py live --symbols BTC,ETH --max-rps 2

  signal-engine:
    build:
      context: ./signal-engine
    volumes:
      - ./data:/app/data
    environment:
      - DATA_ROOT=/app/data
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
      - SYMBOLS=["BTC"]
    depends_on:
      - questdb
    command: python scripts/run_signal_pipeline.py --dry-run --skip-regime

volumes:
  questdb_data:
