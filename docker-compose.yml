version: '3.8'

services:
  questdb:
    image: questdb/questdb:latest
    ports:
      - "9000:9000"  # HTTP
      - "8812:8812"  # PostgreSQL wire protocol
    environment:
      QDB_CAIRO_DEFAULT_TYPE: LINUX
    volumes:
      - questdb_data:/var/lib/questdb
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          bash -c 'exec 3<>/dev/tcp/localhost/9000 &&
          printf "GET / HTTP/1.1\r\nHost: localhost\r\n\r\n" >&3 &&
          timeout 2 cat <&3 | grep -Eq "HTTP/1\\.[01] (200|301)"'
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s

  data-collector:
    build:
      context: .
      dockerfile: Dockerfile.arm64
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
    depends_on:
      questdb:
        condition: service_healthy
    command: python collect_data.py live --symbols BTC,ETH --max-rps 2

  signal-engine:
    build:
      context: ./signal-engine
      dockerfile: Dockerfile.arm64
    volumes:
      - ./data:/app/data
    environment:
      - DATA_ROOT=/app/data
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=quest
      - SYMBOLS=BTC
    depends_on:
      questdb:
        condition: service_healthy
    command: python scripts/run_signal_pipeline.py --dry-run --skip-regime

volumes:
  questdb_data:
