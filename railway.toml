[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.cloud"

[deploy]
startCommand = "python collect_all_symbols_cloud.py"
restartPolicyType = "ALWAYS"

[[environmentVariables]]
ENV = "cloud"

[[environmentVariables]]
PACIFICA_NETWORK = "mainnet"

[[environmentVariables]]
PACIFICA_API_TIMEOUT = "10"

[[environmentVariables]]
PACIFICA_MAX_RETRIES = "5"

[[environmentVariables]]
DATA_ROOT = "/app/data"

[[environmentVariables]]
LOGS_ROOT = "/app/logs"

[[environmentVariables]]
MAX_RPS = "3"

[[environmentVariables]]
POLL_TRADES = "1s"

[[environmentVariables]]
POLL_ORDERBOOK = "3s"

[[environmentVariables]]
POLL_PRICES = "2s"

[[environmentVariables]]
POLL_FUNDING = "60s"

[[environmentVariables]]
BOOK_DEPTH = "25"

[[environmentVariables]]
OUT_ROOT = "/app/data"
