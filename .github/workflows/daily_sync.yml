name: Daily Data Sync & Purge

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI
  schedule:
    - cron: '0 2 * * *' # Runs every day at 2:00 AM UTC

jobs:
  sync-and-purge:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Fly.io CLI
      uses: superfly/flyctl-actions/setup-flyctl@master

    - name: Install AWS CLI (for R2)
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install
        aws --version

    - name: Run Sync and Purge Script
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        S3_ENDPOINT_URL: ${{ secrets.STORAGE_ENDPOINT_URL }}
        AWS_ACCESS_KEY_ID: ${{ secrets.STORAGE_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.STORAGE_SECRET_ACCESS_KEY }}
      run: |
        chmod +x ./scripts/sync_cloud_data.sh
        ./scripts/sync_cloud_data.sh