name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.12']
        architecture: ['x64']
    
    services:
      questdb:
        image: questdb/questdb:latest
        ports:
          - 8812:8812     # Postgres wire protocol
          - 9000:9000     # REST/console
          - 9009:9009     # ILP
        env:
          QDB_CAIRO_DEFAULT_TYPE: LINUX

    steps:
    - uses: actions/checkout@v4
    
    - name: Install curl
      run: |
        sudo apt-get update
        sudo apt-get install -y curl

    - name: Wait for QuestDB to be ready
      run: |
        echo "Waiting for QuestDB to be ready..."
        
        # First, wait for the basic HTTP interface
        echo "Step 1: Waiting for QuestDB HTTP interface..."
        for i in {1..30}; do
          if curl -sf http://localhost:9000/ > /dev/null 2>&1; then
            echo "✅ QuestDB HTTP interface is responding!"
            break
          fi
          echo "HTTP interface not ready... ($i/30)"
          sleep 2
        done
        
        # Then, wait for the SQL engine
        echo "Step 2: Waiting for QuestDB SQL engine..."
        for i in {1..30}; do
          if curl -sf "http://localhost:9000/exec?query=select%201" | grep -q '"dataset":'; then
            echo "✅ QuestDB SQL engine is ready!"
            echo "🎉 QuestDB is fully operational!"
            exit 0
          fi
          echo "SQL engine not ready... ($i/30)"
          sleep 2
        done
        
        echo "❌ QuestDB never became fully ready"
        echo "Container status:"
        docker ps -a
        echo "QuestDB logs:"
        docker logs $(docker ps -aqf "ancestor=questdb/questdb") 2>/dev/null || echo "No logs available"
        exit 1
    
    - name: Set up Python ${{ matrix.python-version }} (${{ matrix.architecture }})
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget
        # Install TA-Lib
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib/
        ./configure --prefix=/usr --build=x86_64-linux-gnu
        make
        sudo make install
        cd ..
        rm -rf ta-lib ta-lib-0.4.0-src.tar.gz
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        cd signal-engine
        pip install -e .
    
    - name: Setup QuestDB schema
      run: |
        cd signal-engine
        python scripts/setup_questdb.py
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest
    
    - name: Run data collector tests
      run: |
        python -m pytest tests/ -v -o addopts=""
    
    - name: Run signal engine unit tests
      run: |
        cd signal-engine
        python -m pytest tests/unit/ -v -o addopts=""
    
    - name: Run signal engine integration tests
      run: |
        cd signal-engine
        python -m pytest tests/integration/ -v -o addopts=""
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest
    
    - name: Test signal pipeline (dry run)
      run: |
        cd signal-engine
        python scripts/run_signal_pipeline.py --symbols BTC --date 2025-10-08 --dry-run --skip-regime
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
        isort --check-only .
        mypy .

    # Always collect QuestDB logs on failure
    - name: Dump QuestDB logs
      if: always()
      run: |
        echo "==== QuestDB Container Status ===="
        docker ps -a
        echo ""
        QID=$(docker ps -aqf "ancestor=questdb/questdb")
        if [ -n "$QID" ]; then
          echo "==== QuestDB logs ===="
          docker logs "$QID" || true
        else
          echo "No QuestDB container found"
        fi
