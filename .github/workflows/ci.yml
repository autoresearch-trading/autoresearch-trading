name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
        architecture: ['x64']
    
    services:
      questdb:
        image: questdb/questdb:latest
        ports:
          - 9000:9000
          - 8812:8812
        env:
          QDB_CAIRO_DEFAULT_TYPE: LINUX
        options: >-
          --health-cmd "curl -f http://localhost:9000/status || exit 1"
          --health-interval 30s
          --health-timeout 10s
          --health-retries 3

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }} (${{ matrix.architecture }})
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        architecture: ${{ matrix.architecture }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential wget
        # Install TA-Lib
        wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
        tar -xzf ta-lib-0.4.0-src.tar.gz
        cd ta-lib/
        ./configure --prefix=/usr --build=x86_64-linux-gnu
        make
        sudo make install
        cd ..
        rm -rf ta-lib ta-lib-0.4.0-src.tar.gz
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        cd signal-engine
        pip install -r requirements.txt
    
    - name: Wait for QuestDB to be ready
      run: |
        timeout 60 bash -c 'until curl -f http://localhost:9000/status; do sleep 2; done'
    
    - name: Setup QuestDB schema
      run: |
        cd signal-engine
        python scripts/setup_questdb.py
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest
    
    - name: Run data collector tests
      run: |
        python -m pytest tests/ -v -o addopts=""
    
    - name: Run signal engine unit tests
      run: |
        cd signal-engine
        python -m pytest tests/unit/ -v -o addopts=""
    
    - name: Run signal engine integration tests
      run: |
        cd signal-engine
        python -m pytest tests/integration/ -v -o addopts=""
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest
    
    - name: Test signal pipeline (dry run)
      run: |
        cd signal-engine
        python scripts/run_signal_pipeline.py --symbols BTC --date 2025-10-08 --dry-run --skip-regime
      env:
        QUESTDB_HOST: localhost
        QUESTDB_PORT: 8812
        QUESTDB_USER: admin
        QUESTDB_PASSWORD: quest

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run linting
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
        isort --check-only .
        mypy . --ignore-missing-imports
