[mypy]
# Ignore missing imports (libraries without type stubs)
ignore_missing_imports = True

# Exclude directories
exclude = (?x)(
    ^config/
    | \.venv/
    | __pycache__/
  )

# Relax strictness for legacy Pydantic code
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = False

# Allow dynamic typing
allow_untyped_calls = True
allow_untyped_defs = True
allow_incomplete_defs = True

# Disable specific checks that are failing
disable_error_code = assignment,var-annotated,arg-type,valid-type,misc,truthy-function,union-attr,import-untyped,attr-defined,return-value

# Show error codes
show_error_codes = True

