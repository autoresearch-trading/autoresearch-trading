# Fly.io template for always-on Pacifica full-fidelity collector.
# Copy to fly.toml or deploy with: fly deploy -c ops/fly/pacifica-full-fidelity/fly.toml
# Update app/primary_region/volume mount to match the Fly app you create.

app = "pacifica-full-fidelity"
primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
  dockerfile = "../../../ops/fly/pacifica-full-fidelity/Dockerfile"

[env]
  PACIFICA_FULL_FIDELITY_ROOT = "/data/pacifica_full_fidelity"
  PACIFICA_FULL_FIDELITY_STATE_DB = "/data/pacifica_full_fidelity_storage.sqlite"
  PACIFICA_FULL_FIDELITY_R2_PREFIX = "raw/pacifica/full_fidelity"
  PACIFICA_FULL_FIDELITY_REMOTE_BASE = "r2:pacifica-trading-data"
  PACIFICA_FULL_FIDELITY_RETENTION_DAYS = "1"
  PACIFICA_FULL_FIDELITY_LIFECYCLE_INTERVAL_S = "900"
  PACIFICA_FULL_FIDELITY_BATCH_LIMIT = "2000"
  PACIFICA_FULL_FIDELITY_UPLOAD_LIMIT = "2000"
  # Catch-up mode: verify/prune the uploaded backlog fast enough that Fly stays a bounded spool.
  PACIFICA_FULL_FIDELITY_VERIFY_LIMIT = "5000"
  PACIFICA_FULL_FIDELITY_FRESH_UPLOAD_LIMIT = "2000"
  PACIFICA_FULL_FIDELITY_FRESH_UPLOAD_TRANSFERS = "16"
  PACIFICA_FULL_FIDELITY_FRESH_UPLOAD_CHECKERS = "32"
  PACIFICA_FULL_FIDELITY_BACKLOG_UPLOAD_LIMIT = "250"
  PACIFICA_FULL_FIDELITY_BACKLOG_LANE_INTERVAL_S = "900"
  PACIFICA_FULL_FIDELITY_BACKLOG_LANE_RUN_ON_MISSING_MARKER = "0"
  PACIFICA_FULL_FIDELITY_RECENT_SCAN_HOURS = "12"
  # Catch-up mode: avoid broad full-archive scans blocking verify/prune; recent scans still discover new closed chunks.
  PACIFICA_FULL_FIDELITY_FULL_SCAN_INTERVAL_S = "0"
  PACIFICA_FULL_FIDELITY_UPLOAD_ORDER = "newest-first"
  PACIFICA_FULL_FIDELITY_MIN_UPLOAD_AGE_SECONDS = "5400"
  PACIFICA_FULL_FIDELITY_MIN_FREE_DISK_GB = "50"
  PACIFICA_FULL_FIDELITY_RAW_PAYLOAD_MODE = "compact"
  PACIFICA_OPS_ROOT = "/data/ops"
  PACIFICA_API_SURFACE_WATCH_INTERVAL_S = "86400"
  PACIFICA_R2_RETENTION_PLAN_INTERVAL_S = "86400"
  PACIFICA_R2_FRESHNESS_CHECK_INTERVAL_S = "3600"
  PACIFICA_R2_FRESHNESS_STALE_AFTER_MIN = "180"
  PACIFICA_R2_FRESHNESS_SAMPLE_PREFIXES = "channel=bbo/symbol=BTC,channel=book/symbol=ETH,channel=trades/symbol=BTC,channel=mark_price_candle/symbol=ICP"
  PACIFICA_OPS_R2_PREFIX = "ops/pacifica/full_fidelity"
  PACIFICA_OPS_UPLOAD_REPORTS = "1"
  PACIFICA_OPS_COMMAND_TIMEOUT_S = "1800"
  PACIFICA_R2_PRUNE_EXECUTE = "1"

  # Configure rclone remote "r2" via Fly secrets for credential values.
  # Non-secret values can stay here.
  RCLONE_CONFIG_R2_TYPE = "s3"
  RCLONE_CONFIG_R2_PROVIDER = "Cloudflare"
  RCLONE_CONFIG_R2_ACL = "private"
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET = "true"

[mounts]
  source = "pacifica_full_fidelity_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
